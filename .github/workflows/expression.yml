name: Expression Workflow

on:
  workflow_dispatch:

jobs:
  expressions:
    runs-on: ubuntu-latest
    steps:
      - name: Run a deployment script
        run: ./deploy.sh

      - name: Cleanup on success
        if: success()
        run: echo "Deployment succeeded"

      - name: Always run cleanup
        if: always()
        run: echo "This step runs regardless of previous results"

      - name: Cancelled example
        if: cancelled()
        run: echo "Previous step was cancelled"
